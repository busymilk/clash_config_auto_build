  - DIRECT
  type: select
- include-all-proxies: true
  interval: 60
  max-failed-times: 3
  name: 香港-手动选择
  timeout: 2000
  type: select
  url: http://www.msftncsi.com/ncsi.txt
- include-all-proxies: true
  interval: 60
  max-failed-times: 3
  name: 香港-自动优选
  timeout: 2000
  tolerance: 50
  type: url-test
  url: http://www.msftncsi.com/ncsi.txt
- include-all-proxies: true
  interval: 60
  max-failed-times: 3
  name: 香港-负载均衡
  strategy: consistent-hashing
  timeout: 2000
  type: load-balance
  url: http://www.msftncsi.com/ncsi.txt
rule-providers:
  applications:
    behavior: classical
    interval: 86400
    path: ./ruleset/applications.yaml
    type: http
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/applications.txt
rules:
- DOMAIN,cdn.jsdelivr.net,DIRECT
- DOMAIN,a.ppconverter.eu.org,DIRECT
- DOMAIN,clash.razord.top,DIRECT
- DOMAIN,yacd.haishan.me,DIRECT
- DOMAIN,ghproxy.com,DIRECT
- RULE-SET,applications,DIRECT
- GEOSITE,category-ads-all,REJECT
- GEOSITE,bing,选择代理
- GEOSITE,microsoft,选择代理
- GEOSITE,private,DIRECT
- GEOIP,lan,DIRECT
- GEOIP,private,DIRECT
- GEOSITE,geolocation-cn,DIRECT
- GEOSITE,geolocation-!cn,选择代理
- GEOIP,cn,DIRECT
- MATCH,选择代理
sniffer:
  enable: true
  skip-domain:
  - Mijia Cloud
  - +.push.apple.com
  sniff:
    HTTP:
      override-destination: true
      ports:
      - 80
      - 8080-8880
    QUIC:
      ports:
      - 443
      - 8443
    TLS:
      ports:
      - 443
      - 8443
tcp-concurrent: true
tun:
  auto-detect-interface: true
  auto-redirect: true
  auto-route: true
  dns-hijack:
  - any:53
  - tcp://any:53
  enable: false
  stack: gvisor
unified-delay: true
