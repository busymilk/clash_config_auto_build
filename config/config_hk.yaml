  type: select
  url: http://www.msftncsi.com/ncsi.txt
- include-all-proxies: true
  interval: 60
  max-failed-times: 3
  name: 香港-自动优选
  timeout: 2000
  tolerance: 50
  type: url-test
  url: http://www.msftncsi.com/ncsi.txt
- include-all-proxies: true
  interval: 60
  max-failed-times: 3
